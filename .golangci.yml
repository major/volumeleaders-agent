version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - modernize
    - nolintlint
    - revive
    - unconvert
    - unparam

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

    errorlint:
      errorf: true
      asserts: true
      comparison: true

    misspell:
      locale: US

    nolintlint:
      require-explanation: true
      require-specific: true

    revive:
      rules:
        - name: indent-error-flow
        - name: unexported-return
          disabled: true

  exclusions:
    generated: strict
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - goconst
          - gosec
          - unparam
      - path: cmd/gendocs/main\.go
        text: "Expect directory permissions to be 0750 or less"
        linters:
          - gosec
      - path: cmd/gendocs/main\.go
        text: "Path traversal via taint analysis"
        linters:
          - gosec
      - path: cmd/gendocs/main\.go
        text: "use new octal literal style"
        linters:
          - gocritic
      - path: internal/cli/trade/trade\.go
        text: "could use tagged switch"
        linters:
          - staticcheck
      - path: _test\.go
        linters:
          - modernize

run:
  timeout: 5m
